<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceiroVK</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">💰 FinanceiroVK</div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="dashboard">
          <span class="nav-icon">📊</span>
          <span class="nav-label">Dashboard</span>
        </button>
        <button class="nav-item" data-view="transaction">
          <span class="nav-icon">💳</span>
          <span class="nav-label">Transação</span>
        </button>
        <button class="nav-item" data-view="statement">
          <span class="nav-icon">📋</span>
          <span class="nav-label">Extrato</span>
        </button>
        <button class="nav-item" data-view="receipt">
          <span class="nav-icon">📸</span>
          <span class="nav-label">Comprovante</span>
        </button>
        <button class="nav-item" data-view="settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">Config</span>
        </button>
      </nav>
    </aside>

    <main class="main-content">
      <section id="view-dashboard" class="view-section" hidden></section>
      <section id="view-transaction" class="view-section" hidden></section>
      <section id="view-statement" class="view-section" hidden></section>
      <section id="view-receipt" class="view-section" hidden></section>
      <section id="view-settings" class="view-section" hidden></section>
    </main>
  </div>

  <div id="wizard-overlay" class="wizard-overlay" hidden></div>

  <div id="alert-container" style="position:fixed;top:16px;right:16px;z-index:300;display:flex;flex-direction:column;gap:8px;"></div>
</body>
</html>
